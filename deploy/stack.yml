version: "3.8"

# VoiceStream production stack — Docker Swarm (managed via Portainer GitOps).
# Sensitive values are passed as environment variables via Portainer's
# "Environment variables" form (NOT Docker Swarm secrets).
#
# External infra (already provisioned on the swarm, NOT defined here):
#   - Postgres   : reachable on `network_swarm_public` as `postgres:5432`
#   - SeaweedFS  : reachable on `network_swarm_public` as `seaweedfs:8333`
#   - Dragonfly  : reachable on `network_swarm_public` as `dragonfly:6379`
#   - Traefik    : attached to `network_swarm_public`, terminates TLS

services:
  web:
    image: ghcr.io/troiston/voicestream-web:latest
    hostname: voicestream-web
    environment:
      TZ: ${TZ}
      NODE_ENV: ${NODE_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - network_swarm_public
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1G
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_swarm_public"

        - "traefik.http.routers.voicestream-web.rule=Host(`voicestream.com.br`)"
        - "traefik.http.routers.voicestream-web.entrypoints=websecure"
        - "traefik.http.routers.voicestream-web.tls=true"
        - "traefik.http.routers.voicestream-web.tls.certresolver=letsencrypt"
        - "traefik.http.routers.voicestream-web.middlewares=voicestream-hsts@docker"

        - "traefik.http.routers.voicestream-web-http.rule=Host(`voicestream.com.br`)"
        - "traefik.http.routers.voicestream-web-http.entrypoints=web"
        - "traefik.http.routers.voicestream-web-http.middlewares=voicestream-https-redirect@docker"

        - "traefik.http.middlewares.voicestream-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.voicestream-https-redirect.redirectscheme.permanent=true"

        - "traefik.http.middlewares.voicestream-hsts.headers.stsSeconds=63072000"
        - "traefik.http.middlewares.voicestream-hsts.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.voicestream-hsts.headers.stsPreload=true"
        - "traefik.http.middlewares.voicestream-hsts.headers.forceSTSHeader=true"

        - "traefik.http.services.voicestream-web.loadbalancer.server.port=3000"

  worker:
    image: ghcr.io/troiston/voicestream-worker:latest
    hostname: voicestream-worker
    environment:
      TZ: ${TZ}
      NODE_ENV: ${NODE_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - network_swarm_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1.5G
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

networks:
  network_swarm_public:
    name: network_swarm_public
    external: true
