version: "3.9"

# VoiceStream production stack — Docker Swarm.
# Deployed via Portainer Git integration (auto-redeploy on push to main).
#
# External infrastructure (provisioned out-of-band, NOT defined here):
#   - Postgres            : reachable on the `internal` overlay as `postgres:5432`
#   - SeaweedFS (S3 API)  : reachable on the `internal` overlay as `seaweedfs:8333`
#   - Dragonfly (Redis)   : reachable on the `internal` overlay as `dragonfly:6379`
#   - Traefik             : attached to the external `traefik-public` network

services:
  web:
    image: ghcr.io/troiston/voicestream-web:latest
    networks:
      - traefik-public
      - internal
    environment:
      NODE_ENV: production
      BETTER_AUTH_URL: https://voicestream.com.br
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: voicestream-recordings
      S3_FORCE_PATH_STYLE: "true"
      NEXT_PUBLIC_APP_NAME: VoiceStream
    secrets:
      - database_url
      - better_auth_secret
      - google_client_id
      - google_client_secret
      - resend_api_key
      - s3_access_key
      - s3_secret_key
      - deepgram_api_key
      - anthropic_api_key
      - redis_url
      - stripe_secret_key
      - stripe_webhook_secret
      - encryption_key
      - sentry_dsn
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"

        - "traefik.http.routers.voicestream-web.rule=Host(`voicestream.com.br`)"
        - "traefik.http.routers.voicestream-web.entrypoints=websecure"
        - "traefik.http.routers.voicestream-web.tls=true"
        - "traefik.http.routers.voicestream-web.tls.certresolver=letsencrypt"
        - "traefik.http.routers.voicestream-web.middlewares=voicestream-hsts@docker"

        - "traefik.http.routers.voicestream-web-http.rule=Host(`voicestream.com.br`)"
        - "traefik.http.routers.voicestream-web-http.entrypoints=web"
        - "traefik.http.routers.voicestream-web-http.middlewares=voicestream-https-redirect@docker"

        - "traefik.http.middlewares.voicestream-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.voicestream-https-redirect.redirectscheme.permanent=true"

        - "traefik.http.middlewares.voicestream-hsts.headers.stsSeconds=63072000"
        - "traefik.http.middlewares.voicestream-hsts.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.voicestream-hsts.headers.stsPreload=true"
        - "traefik.http.middlewares.voicestream-hsts.headers.forceSTSHeader=true"

        - "traefik.http.services.voicestream-web.loadbalancer.server.port=3000"

  worker:
    image: ghcr.io/troiston/voicestream-worker:latest
    networks:
      - internal
    environment:
      NODE_ENV: production
      BETTER_AUTH_URL: https://voicestream.com.br
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: voicestream-recordings
      S3_FORCE_PATH_STYLE: "true"
      NEXT_PUBLIC_APP_NAME: VoiceStream
    secrets:
      - database_url
      - better_auth_secret
      - resend_api_key
      - s3_access_key
      - s3_secret_key
      - deepgram_api_key
      - anthropic_api_key
      - redis_url
      - stripe_secret_key
      - stripe_webhook_secret
      - encryption_key
      - sentry_dsn
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

networks:
  traefik-public:
    external: true
  internal:
    driver: overlay
    attachable: true

secrets:
  database_url:
    external: true
  better_auth_secret:
    external: true
  google_client_id:
    external: true
  google_client_secret:
    external: true
  resend_api_key:
    external: true
  s3_access_key:
    external: true
  s3_secret_key:
    external: true
  deepgram_api_key:
    external: true
  anthropic_api_key:
    external: true
  redis_url:
    external: true
  stripe_secret_key:
    external: true
  stripe_webhook_secret:
    external: true
  encryption_key:
    external: true
  sentry_dsn:
    external: true
